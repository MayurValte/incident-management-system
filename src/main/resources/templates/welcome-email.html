<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Welcome</title>
</head>

<body style="font-family:Arial,sans-serif;background:#f5f5f5;padding:20px;">

<div style="max-width:700px;margin:auto;background:white;border-radius:10px;">

    <div style="background:#198754;color:white;padding:20px;">
        <h2>Welcome to EIMP</h2>
    </div>

    <div style="padding:20px;">

        <h3>Hello <span th:text="${name}"></span>,</h3>

        <p>
            Your account has been created successfully.
        </p>

        <table border="1" cellpadding="10" width="100%">
            <tr>
                <td><b>Email</b></td>
                <td th:text="${email}"></td>
            </tr>

            <tr>
                <td><b>Temporary Password</b></td>
                <td th:text="${password}"></td>
            </tr>

            <tr>
                <td><b>Role</b></td>
                <td th:text="${role}"></td>
            </tr>
        </table>

    </div>

</div>

</body>
</html>
