<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alert Notification</title>
</head>

<body style="font-family: Arial, sans-serif; background:#f5f5f5; padding:20px;">

<div style="max-width:700px;margin:auto;background:white;border-radius:10px;overflow:hidden;">

    <div style="background:#dc3545;color:white;padding:20px;">
        <h2>EIMP Alert Notification</h2>
    </div>

    <div style="padding:20px;">

        <h3>
            Alert #<span th:text="${alertId}"></span>
        </h3>

        <table border="1" cellpadding="10" cellspacing="0" width="100%">
            <tr>
                <td><b>Title</b></td>
                <td th:text="${title}"></td>
            </tr>

            <tr>
                <td><b>Description</b></td>
                <td th:text="${description}"></td>
            </tr>

            <tr>
                <td><b>Severity</b></td>
                <td th:text="${severity}"></td>
            </tr>

            <tr>
                <td><b>Status</b></td>
                <td th:text="${status}"></td>
            </tr>

            <tr>
                <td><b>Device</b></td>
                <td th:text="${deviceName}"></td>
            </tr>
        </table>

    </div>

</div>

</body>
</html>
