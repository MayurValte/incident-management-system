<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Password Reset</title>
</head>

<body style="font-family:Arial,sans-serif;background:#f5f5f5;padding:20px;">

<div style="max-width:700px;margin:auto;background:white;border-radius:10px;">

    <div style="background:#0d6efd;color:white;padding:20px;">
        <h2>Password Changed</h2>
    </div>

    <div style="padding:20px;">

        <h3>Hello <span th:text="${name}"></span></h3>

        <h4>
            Your password has been changed
        </h4>

        <p style="margin-top:20px;">
            If you did not request a password reset, please reach out to support@eimp.com
        </p>

    </div>

</div>

</body>
</html>
